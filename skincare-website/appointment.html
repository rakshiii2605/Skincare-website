<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Appointment</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar bg-white shadow-sm p-3">
  <div class="container">
    <h4 class="brand">SkinCare Clinic</h4>
  </div>
</nav>

<!-- APPOINTMENT SECTION -->
<section class="appointment-section">

<div class="container">
  <div class="row align-items-center">

    <!-- LEFT SIDE (INFO) -->
    <div class="col-md-5">
      <h2>Book Your Consultation</h2>
      <p>Get personalized skincare treatment from expert dermatologists.</p>

      <div class="info-box">
        ✔ Experienced Doctors <br>
        ✔ Advanced Technology <br>
        ✔ Safe & Trusted Treatments
      </div>
    </div>

    <!-- RIGHT SIDE (FORM) -->
    <div class="col-md-7">
      <div class="appointment-card">

        <h4 class="mb-3">Appointment Details</h4>

        <form onsubmit="submitForm(event)">

          <div class="row">
            <div class="col-md-6">
              <input type="text" placeholder="Full Name" class="form-control" required>
            </div>
            <div class="col-md-6">
              <input type="tel" placeholder="Phone Number" class="form-control" required>
            </div>
          </div>

          <input type="email" placeholder="Email Address" class="form-control mt-3" required>

          <div class="row mt-3">
            <div class="col-md-6">
              <select class="form-control">
                <option>Select Service</option>
                <option>Acne Treatment</option>
                <option>Laser Therapy</option>
                <option>Hair Treatment</option>
              </select>
            </div>

            <div class="col-md-6">
              <select class="form-control">
                <option>Select Doctor</option>
                <option>Dr. Priya</option>
                <option>Dr. Rahul</option>
              </select>
            </div>
          </div>

          <div class="row mt-3">
            <div class="col-md-6">
              <input type="date" class="form-control" required>
            </div>
            <div class="col-md-6">
              <input type="time" class="form-control" required>
            </div>
          </div>

          <textarea placeholder="Your Concern" class="form-control mt-3"></textarea>

          <button class="btn btn-soft w-100 mt-4">Confirm Appointment</button>

        </form>

        <p id="msg" class="text-success mt-3 text-center"></p>

      </div>
    </div>

  </div>
</div>

</section>

<script src="js/script.js"></script>

</body>
</html>
